<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Math 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky-top:    #89CFF0;
            --sky-mid:    #B8E4FF;
            --sky-bot:    #E8F8FF;
            --white-card: rgba(255, 255, 255, 0.92);
            --text-dark:  #1e2a5e;
            --text-mid:   #4a5599;
            --accent-sub: #FF4D6D;
            --accent-add: #2DC653;
            --gold:       #FFB800;
            --shadow:     0 12px 40px rgba(30, 42, 94, 0.14);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bot) 100%);
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* ─── Clouds ───────────────────────────── */
        .cloud { position: fixed; pointer-events: none; z-index: 0; opacity: .75; }

        .cloud-shape {
            position: relative;
            width: 110px; height: 38px;
            background: #fff;
            border-radius: 50px;
        }
        .cloud-shape::before, .cloud-shape::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .cloud-shape::before { width: 56px; height: 56px; top: -26px; left: 18px; }
        .cloud-shape::after  { width: 38px; height: 38px; top: -18px; left: 60px; }

        .cloud-a { top: 10%; left:  4%; animation: drift 22s ease-in-out infinite alternate; }
        .cloud-b { top: 18%; right: 6%; animation: drift 28s ease-in-out infinite alternate-reverse; }
        .cloud-c { top: 35%; left: 12%; animation: drift 18s ease-in-out 5s infinite alternate; transform: scale(.7); }

        @keyframes drift { from { transform: translateX(-14px); } to { transform: translateX(14px); } }

        /* ─── Main wrapper ─────────────────────── */
        .page { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 16px 48px; }

        /* ─── Header ───────────────────────────── */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0 10px;
            flex-wrap: wrap; gap: 10px;
        }

        .logo {
            font-size: 1.55rem; font-weight: 700;
            color: var(--text-dark);
            text-shadow: 0 2px 0 rgba(255,255,255,.6);
        }

        .score-strip { display: flex; align-items: center; gap: 10px; }

        .chip {
            background: var(--white-card);
            border-radius: 24px;
            padding: 6px 16px;
            font-weight: 700; font-size: .95rem;
            box-shadow: 0 3px 10px rgba(30,42,94,.12);
            color: var(--text-dark);
        }
        .chip.gold { background: linear-gradient(135deg,#FFD700,#FFA500); color: #fff; }

        .menu-btn {
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none;
            background: linear-gradient(135deg, #6f7cff, #4a5ddb);
            color: #fff; font-family: 'Fredoka', sans-serif;
            font-weight: 700; font-size: .95rem;
            border-radius: 24px; padding: 8px 18px;
            box-shadow: 0 3px 12px rgba(74,93,219,.35);
            transition: transform .2s, box-shadow .2s;
        }
        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(74,93,219,.4); }

        /* ─── Mode Tabs ────────────────────────── */
        .mode-tabs {
            display: flex; justify-content: center; gap: 12px;
            margin: 14px 0 6px;
        }

        .tab {
            background: rgba(255,255,255,.7);
            border: 3px solid transparent;
            border-radius: 30px;
            padding: 10px 28px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            cursor: pointer; color: var(--text-mid);
            transition: all .22s;
        }
        .tab:hover { background: rgba(255,255,255,.9); transform: translateY(-1px); }

        .tab.active-sub {
            background: linear-gradient(135deg, #FF4D6D, #CC1C3A);
            border-color: #FF4D6D; color: #fff;
            box-shadow: 0 5px 18px rgba(255,77,109,.45);
        }
        .tab.active-add {
            background: linear-gradient(135deg, #2DC653, #1a9e3f);
            border-color: #2DC653; color: #fff;
            box-shadow: 0 5px 18px rgba(45,198,83,.45);
        }

        /* ─── Equation Card ────────────────────── */
        .equation-card {
            background: var(--white-card);
            border-radius: 28px;
            padding: 22px 28px 18px;
            text-align: center;
            box-shadow: var(--shadow);
            margin: 12px 0;
        }

        .equation {
            font-size: clamp(2.4rem, 9vw, 4.2rem);
            font-weight: 700;
            letter-spacing: 6px;
            line-height: 1.1;
            color: var(--text-dark);
        }
        .eq-op-sub { color: var(--accent-sub); }
        .eq-op-add { color: var(--accent-add); }
        .eq-qmark  { color: var(--gold); display: inline-block; animation: pulse 1s ease-in-out infinite; }
        .eq-answer { color: #7B2FFF; display: inline-block; animation: popIn .4s ease; }

        .hint-row {
            margin-top: 10px;
            font-size: 1.15rem; font-weight: 600; color: var(--text-mid);
            min-height: 1.7rem;
        }

        /* ─── Balloon Arena ────────────────────── */
        .arena-wrap {
            background: var(--white-card);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 28px 20px 18px;
            min-height: 220px;
            margin-bottom: 10px;
        }

        .arena {
            display: flex; flex-wrap: wrap;
            justify-content: center; align-items: flex-end;
            gap: 14px;
            min-height: 160px;
        }

        /* ─── Balloon Anatomy ──────────────────── */
        .balloon {
            display: inline-flex; flex-direction: column; align-items: center;
            cursor: pointer; user-select: none;
            animation: floatBob 3s ease-in-out infinite;
            transition: filter .15s;
        }
        .balloon:hover { filter: brightness(1.1); }
        .balloon:nth-child(2n)   { animation-duration: 3.4s; animation-delay: .4s; }
        .balloon:nth-child(3n)   { animation-duration: 2.7s; animation-delay: .9s; }
        .balloon:nth-child(4n)   { animation-duration: 3.8s; animation-delay: 1.3s; }

        .balloon-body {
            width: 60px; height: 74px;
            border-radius: 50% 50% 50% 50% / 56% 56% 44% 44%;
            position: relative;
            box-shadow: inset -6px -6px 14px rgba(0,0,0,.13), 0 6px 18px rgba(0,0,0,.16);
        }
        .balloon-shine {
            position: absolute;
            width: 18px; height: 22px;
            background: rgba(255,255,255,.42);
            border-radius: 50%;
            top: 9px; left: 11px;
        }
        .balloon-knot {
            width: 10px; height: 11px;
            border-radius: 50%;
            margin-top: -1px;
        }
        .balloon-string {
            width: 2px; height: 26px;
            background: rgba(0,0,0,.22);
            border-radius: 1px;
        }

        /* Colour variants */
        .bc-0 .balloon-body, .bc-0 .balloon-knot { background: linear-gradient(135deg, #FF8A80, #E53935); }
        .bc-1 .balloon-body, .bc-1 .balloon-knot { background: linear-gradient(135deg, #FFD740, #FF8F00); }
        .bc-2 .balloon-body, .bc-2 .balloon-knot { background: linear-gradient(135deg, #69F0AE, #00C853); }
        .bc-3 .balloon-body, .bc-3 .balloon-knot { background: linear-gradient(135deg, #40C4FF, #0277BD); }
        .bc-4 .balloon-body, .bc-4 .balloon-knot { background: linear-gradient(135deg, #EA80FC, #7B1FA2); }
        .bc-5 .balloon-body, .bc-5 .balloon-knot { background: linear-gradient(135deg, #FF9E80, #BF360C); }
        .bc-6 .balloon-body, .bc-6 .balloon-knot { background: linear-gradient(135deg, #F48FB1, #C2185B); }
        .bc-7 .balloon-body, .bc-7 .balloon-knot { background: linear-gradient(135deg, #80DEEA, #00838F); }

        /* Wave-2 entry */
        .balloon.wave2 {
            animation: floatIn .7s ease forwards;
        }
        .balloon.wave2:nth-child(2n)  { animation-delay: .08s; }
        .balloon.wave2:nth-child(3n)  { animation-delay: .16s; }
        .balloon.wave2:nth-child(4n+1){ animation-delay: .24s; }

        /* Popped */
        .balloon.popped {
            animation: doPop .35s ease forwards;
            pointer-events: none;
        }

        /* ─── Pop progress ─────────────────────── */
        .pop-row {
            text-align: center;
            font-size: 1.1rem; font-weight: 600; color: var(--text-mid);
            min-height: 1.8rem; margin-top: 6px;
        }

        .pip-row {
            display: flex; justify-content: center; gap: 6px; margin-top: 8px; flex-wrap: wrap;
        }
        .pip {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #e0e0e0;
            border: 2.5px solid #bbb;
            transition: background .2s, border-color .2s;
        }
        .pip.filled {
            background: var(--accent-sub);
            border-color: var(--accent-sub);
            animation: pipPop .3s ease;
        }

        /* ─── Controls ─────────────────────────── */
        .controls {
            display: flex; justify-content: center; gap: 14px;
            margin-top: 16px; flex-wrap: wrap;
        }

        .btn-next {
            background: linear-gradient(135deg, #6f7cff, #4a5ddb);
            color: #fff; border: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.15rem; font-weight: 700;
            border-radius: 30px; padding: 14px 40px;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(74,93,219,.38);
            transition: transform .2s, box-shadow .2s;
        }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(74,93,219,.45); }
        .btn-next:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ─── Streak ───────────────────────────── */
        .streak-bar {
            text-align: center; font-size: 1rem;
            font-weight: 700; color: #FF6B6B;
            min-height: 1.4rem; margin-top: 6px;
        }

        /* ─── Celebration Overlay ──────────────── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(10, 20, 60, .45);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
            animation: fadeIn .25s ease;
        }
        .overlay.hidden { display: none; }

        .cel-card {
            background: #fff;
            border-radius: 32px;
            padding: 40px 48px;
            text-align: center;
            box-shadow: 0 24px 72px rgba(0,0,0,.28);
            animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
            max-width: 340px; width: 90%;
        }
        .cel-emoji  { font-size: 4rem; margin-bottom: 10px; display: block; }
        .cel-title  { font-size: 2.2rem; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
        .cel-eq     { font-size: 1.7rem; font-weight: 700; color: #7B2FFF; margin-bottom: 22px; }
        .btn-cel-next {
            background: linear-gradient(135deg, #6f7cff, #4a5ddb);
            color: #fff; border: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.15rem; font-weight: 700;
            border-radius: 30px; padding: 13px 36px;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(74,93,219,.38);
            transition: transform .2s;
        }
        .btn-cel-next:hover { transform: scale(1.05); }

        /* ─── Confetti ─────────────────────────── */
        .confetti-piece {
            position: fixed; pointer-events: none; z-index: 300;
            animation: confettiFall linear forwards;
            border-radius: 2px;
        }

        /* ─── Keyframes ────────────────────────── */
        @keyframes floatBob {
            0%,100% { transform: translateY(0)    rotate(-2deg); }
            50%      { transform: translateY(-16px) rotate( 2deg); }
        }
        @keyframes floatIn {
            0%  { transform: translateY(70px) scale(.25); opacity: 0; }
            75% { transform: translateY(-8px)  scale(1.06); opacity: 1; }
            100%{ transform: translateY(0)     scale(1);    opacity: 1; }
        }
        @keyframes doPop {
            0%  { transform: scale(1);   opacity: 1; }
            45% { transform: scale(1.45) rotate(8deg); opacity: .8; }
            100%{ transform: scale(0);   opacity: 0; }
        }
        @keyframes popIn {
            from { transform: scale(.4); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }
        @keyframes pulse {
            0%,100%{ transform: scale(1); }
            50%    { transform: scale(1.12); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes pipPop {
            0%  { transform: scale(1); }
            50% { transform: scale(1.5); }
            100%{ transform: scale(1); }
        }
        @keyframes confettiFall {
            0%   { opacity: 1; transform: translateY(-10px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh)  rotate(720deg); }
        }

        /* ─── Responsive tweaks ────────────────── */
        @media (max-width: 480px) {
            .equation { letter-spacing: 3px; }
            .balloon-body { width: 52px; height: 64px; }
            .tab { padding: 8px 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- Clouds -->
<div class="cloud cloud-a"><div class="cloud-shape"></div></div>
<div class="cloud cloud-b"><div class="cloud-shape"></div></div>
<div class="cloud cloud-c"><div class="cloud-shape"></div></div>

<div class="page">

    <!-- Header -->
    <header class="header">
        <div class="logo">🎈 Balloon Math</div>
        <div class="score-strip">
            <div class="chip gold">⭐ <span id="scoreVal">0</span></div>
            <a href="games-menu.html" class="menu-btn">🏠 Menu</a>
        </div>
    </header>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
        <button class="tab active-sub" id="tabSub" onclick="setMode('subtract')">➖ Subtraction</button>
        <button class="tab"            id="tabAdd" onclick="setMode('add')">➕ Addition</button>
    </div>

    <!-- Equation Card -->
    <div class="equation-card">
        <div class="equation" id="equation" aria-live="polite"></div>
        <div class="hint-row" id="hintRow"></div>
    </div>

    <!-- Balloon Arena -->
    <div class="arena-wrap">
        <div class="arena" id="arena" aria-label="Balloon play area"></div>
        <div class="pip-row" id="pipRow"></div>
        <div class="pop-row" id="popRow"></div>
    </div>

    <!-- Streak -->
    <div class="streak-bar" id="streakBar"></div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next ➡</button>
    </div>

</div><!-- .page -->

<!-- Celebration overlay -->
<div class="overlay hidden" id="overlay" role="dialog" aria-modal="true" aria-labelledby="celTitle">
    <div class="cel-card">
        <span class="cel-emoji" id="celEmoji">🎉</span>
        <div class="cel-title" id="celTitle">Amazing!</div>
        <div class="cel-eq"   id="celEq"></div>
        <button class="btn-cel-next" id="btnCelNext">Keep Going! ➡</button>
    </div>
</div>

<script>
    /* =====================================================
       BALLOON MATH — game logic
    ===================================================== */

    const PRAISES = [
        ['🎉','Fantastic!'], ['⭐','Brilliant!'], ['🌟','Super Star!'],
        ['🦄','Magical!'],   ['🎈','Perfect!'],  ['🔥','On Fire!'],
        ['🏆','Champion!'],  ['💫','Dazzling!'],
    ];

    // ── state ──────────────────────────────────────────
    const S = {
        mode:       'subtract',
        q:          null,   // { a, b, op, answer }
        popped:     0,
        score:      0,
        streak:     0,
        answered:   false,
        wave2Timer: null,
    };

    // ── helpers ────────────────────────────────────────
    const el = id => document.getElementById(id);

    function rand(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }

    function genQuestion(){
        if (S.mode === 'subtract'){
            const a = rand(2, 10);
            const b = rand(1, a - 1);
            return { a, b, op:'-', answer: a - b };
        } else {
            const a = rand(1, 5);
            const b = rand(1, Math.min(5, 10 - a));
            return { a, b, op:'+', answer: a + b };
        }
    }

    // ── equation rendering ─────────────────────────────
    function renderEq(showAnswer){
        const q = S.q;
        const opClass = q.op === '-' ? 'eq-op-sub' : 'eq-op-add';
        const rhs = showAnswer
            ? `<span class="eq-answer">${q.answer}</span>`
            : `<span class="eq-qmark">?</span>`;
        el('equation').innerHTML =
            `${q.a}&thinsp;<span class="${opClass}">${q.op}</span>&thinsp;${q.b}&thinsp;=&thinsp;${rhs}`;
    }

    // ── balloon factory ────────────────────────────────
    function makeBalloon(colorIdx, isWave2, delay){
        const div = document.createElement('div');
        div.className = `balloon bc-${colorIdx % 8}${isWave2 ? ' wave2' : ''}`;
        if (isWave2) div.style.animationDelay = delay + 's';
        div.innerHTML =
            `<div class="balloon-body"><div class="balloon-shine"></div></div>` +
            `<div class="balloon-knot"></div><div class="balloon-string"></div>`;
        return div;
    }

    // ── pip progress (subtraction only) ───────────────
    function buildPips(){
        const row = el('pipRow');
        row.innerHTML = '';
        if (S.mode !== 'subtract') return;
        for (let i = 0; i < S.q.b; i++){
            const p = document.createElement('div');
            p.className = 'pip';
            p.id = `pip-${i}`;
            row.appendChild(p);
        }
    }

    function fillPip(idx){
        const p = document.getElementById(`pip-${idx}`);
        if (p) p.classList.add('filled');
    }

    // ── balloon click (subtract mode) ─────────────────
    function onBalloonClick(balloon){
        if (S.answered || balloon.classList.contains('popped')) return;
        if (S.mode !== 'subtract') return;

        balloon.classList.add('popped');
        fillPip(S.popped);
        S.popped++;

        el('popRow').textContent = `Popped: ${S.popped} / ${S.q.b}`;

        if (S.popped >= S.q.b){
            setTimeout(revealAnswer, 420);
        }
    }

    // ── render balloons ────────────────────────────────
    function renderBalloons(){
        const arena = el('arena');
        arena.innerHTML = '';
        el('pipRow').innerHTML = '';
        el('popRow').textContent = '';
        const q = S.q;

        if (S.mode === 'subtract'){
            for (let i = 0; i < q.a; i++){
                const b = makeBalloon(i * 3 + 1, false, 0);
                b.addEventListener('click', () => onBalloonClick(b));
                b.setAttribute('aria-label', 'Balloon – click to pop');
                b.setAttribute('role', 'button');
                b.setAttribute('tabindex', '0');
                b.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') onBalloonClick(b); });
                arena.appendChild(b);
            }
            buildPips();
            el('hintRow').textContent  = `Pop ${q.b} balloon${q.b > 1 ? 's' : ''}! 🎯`;
            el('popRow').textContent   = `Popped: 0 / ${q.b}`;

        } else {
            // Wave 1
            for (let i = 0; i < q.a; i++){
                arena.appendChild(makeBalloon(i * 2, false, 0));
            }
            el('hintRow').textContent = `${q.a} balloon${q.a > 1 ? 's' : ''}… more are coming! 👀`;
            el('popRow').textContent  = '';

            // Wave 2 after 2.4 s
            S.wave2Timer = setTimeout(() => {
                if (S.answered) return;
                for (let i = 0; i < q.b; i++){
                    arena.appendChild(makeBalloon(i * 2 + 1, true, i * 0.1));
                }
                el('hintRow').textContent = `${q.a} + ${q.b} = how many? 🤔`;

                // Auto-reveal after balloons have floated in
                setTimeout(() => { if (!S.answered) revealAnswer(); }, 1600);
            }, 2400);
        }
    }

    // ── reveal answer ──────────────────────────────────
    function revealAnswer(){
        if (S.answered) return;
        S.answered = true;
        S.score++;
        S.streak++;
        el('scoreVal').textContent = S.score;

        renderEq(true);

        if (S.mode === 'subtract'){
            el('hintRow').textContent = `${S.q.a} − ${S.q.b} = ${S.q.answer}  ✨ Great job!`;
            el('popRow').textContent  = `⭐ ${S.q.a} balloons minus ${S.q.b} popped = ${S.q.answer} left!`;
        } else {
            el('hintRow').textContent = `${S.q.a} + ${S.q.b} = ${S.q.answer}  🎉 Amazing!`;
            el('popRow').textContent  = `⭐ ${S.q.a} balloons + ${S.q.b} balloons = ${S.q.answer} total!`;
        }

        if (S.streak >= 3){
            el('streakBar').textContent = `🔥 ${S.streak} correct in a row!`;
        }

        launchConfetti();
        showCelebration();
    }

    // ── celebration overlay ────────────────────────────
    function showCelebration(){
        const p = PRAISES[(S.score - 1) % PRAISES.length];
        el('celEmoji').textContent = p[0];
        el('celTitle').textContent = p[1];
        el('celEq').textContent    = `${S.q.a} ${S.q.op} ${S.q.b} = ${S.q.answer}`;
        setTimeout(() => {
            el('overlay').classList.remove('hidden');
            el('btnCelNext').focus();
        }, 500);
    }

    function hideCelebration(){
        el('overlay').classList.add('hidden');
    }

    // ── confetti ───────────────────────────────────────
    function launchConfetti(){
        const cols = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F43','#F48FB1','#80DEEA'];
        for (let i = 0; i < 50; i++){
            setTimeout(() => {
                const p = document.createElement('div');
                const size = 7 + Math.random() * 8;
                p.className = 'confetti-piece';
                p.style.cssText = [
                    `left:${Math.random()*100}vw`,
                    `top:-12px`,
                    `width:${size}px`,
                    `height:${size}px`,
                    `background:${cols[Math.floor(Math.random()*cols.length)]}`,
                    `border-radius:${Math.random()>.5?'50%':'3px'}`,
                    `animation-duration:${1.4+Math.random()*1.6}s`,
                    `animation-delay:${Math.random()*0.4}s`,
                ].join(';');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3500);
            }, i * 28);
        }
    }

    // ── public API ─────────────────────────────────────
    function setMode(mode){
        S.mode = mode;
        el('tabSub').className = 'tab' + (mode === 'subtract' ? ' active-sub' : '');
        el('tabAdd').className = 'tab' + (mode === 'add'      ? ' active-add' : '');
        nextQuestion();
    }

    function nextQuestion(){
        if (S.wave2Timer){ clearTimeout(S.wave2Timer); S.wave2Timer = null; }
        hideCelebration();
        if (!S.answered && S.streak > 0) S.streak = 0; // only reset on skip
        S.popped   = 0;
        S.answered = false;
        S.q        = genQuestion();
        el('streakBar').textContent = S.streak >= 3 ? `🔥 Streak: ${S.streak}` : '';
        renderEq(false);
        renderBalloons();
    }

    // ── wire up overlay next btn ──────────────────────
    el('btnCelNext').addEventListener('click', () => nextQuestion());

    // ── keyboard: space/enter on arena for accessibility
    document.addEventListener('keydown', e => {
        if (e.key === 'n' || e.key === 'N') nextQuestion();
    });

    // ── kick off ──────────────────────────────────────
    nextQuestion();
</script>
</body>
</html>
