<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Fun for Kids</title>
    <link rel="stylesheet" href="snake-style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 SNAKE GAME 🐍</h1>
        </div>
        
        <div class="game-wrapper">
            <div class="game-area">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>
            
            <div class="info-panel">
                <div class="score-board">
                    <h2>SCORE</h2>
                    <div id="score" class="score-value">0</div>
                </div>
                
                <div class="controls-info">
                    <h3>Controls</h3>
                    <div class="arrow-keys">
                        <div class="key-group">
                            <div class="key">↑</div>
                            <span>UP</span>
                        </div>
                        <div class="key-group">
                            <div class="key">↓</div>
                            <span>DOWN</span>
                        </div>
                        <div class="key-group">
                            <div class="key">←</div>
                            <span>LEFT</span>
                        </div>
                        <div class="key-group">
                            <div class="key">→</div>
                            <span>RIGHT</span>
                        </div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button id="startBtn" class="btn btn-play">START GAME</button>
                    <button id="pauseBtn" class="btn btn-pause">PAUSE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="snake-game.js"></script>
</body>
</html>
