<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Makeover! 🦄✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <section class="game-shell">
            <header class="top-bar">
                <div class="title-area">
                    <p class="eyebrow">✨ Magical Beauty Salon ✨</p>
                    <h1>Unicorn Makeover! 🦄</h1>
                    <a href="games-menu.html" style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;text-decoration:none;background:linear-gradient(135deg,#9B59B6,#6a1fa2);color:#fff;border-radius:20px;padding:6px 16px;font-size:0.85rem;font-weight:700;box-shadow:0 3px 10px rgba(155,89,182,0.35);">🎮 All Games</a>
                </div>
                <div class="progress-card" aria-live="polite">
                    <span class="progress-label">Looks Done</span>
                    <strong id="progressValue">0 / 6</strong>
                    <div class="progress-stars" id="progressStars" aria-hidden="true"></div>
                </div>
            </header>

            <section class="board-section">
                <div class="canvas-frame">
                    <canvas id="gameCanvas" width="480" height="480" aria-label="Unicorn makeover canvas"></canvas>
                    <div id="completeOverlay" class="dialog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
                        <div class="dialog-card">
                            <p class="dialog-emoji">🦄💖✨</p>
                            <h2 id="completeTitle">So Beautiful!</h2>
                            <p>Your unicorn loves the makeover!</p>
                            <p id="finalStars" class="final-stars"></p>
                            <button id="resetButton" class="primary-button" type="button">New Look 🎨</button>
                        </div>
                    </div>
                </div>

                <aside class="makeup-panel">
                    <div class="panel-section">
                        <h3 class="panel-title">💄 Choose Makeup</h3>
                        <div class="parts-list" id="partsList" role="listbox" aria-label="Makeup items"></div>
                    </div>

                    <div class="panel-section">
                        <h3 class="panel-title">🎨 Pick a Color</h3>
                        <div class="color-grid" id="colorGrid" role="listbox" aria-label="Color palette"></div>
                    </div>

                    <div class="panel-section action-section">
                        <button id="applyButton" class="apply-button" type="button">
                            ✨ Apply! <span class="key-hint">Enter</span>
                        </button>
                        <button id="clearButton" class="clear-button" type="button">Reset 🔄</button>
                    </div>

                    <div class="panel-section hint-section">
                        <p class="hint-text">
                            <span>⬆⬇ Choose makeup</span>
                            <span>⬅➡ Pick a color</span>
                            <span><kbd>Enter</kbd> to Apply!</span>
                        </p>
                    </div>
                </aside>
            </section>
        </section>
    </main>
    <script src="game.js"></script>
</body>
</html>
